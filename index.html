<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FKode - Elite Industrial ID</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700;900&display=swap" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Chivo+Mono:wght@300;700&family=Outfit:wght@400;900&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        @font-face {
            font-family: 'Automata';
            font-style: normal;
            font-weight: normal;
            src: url('fonts/AUTOMATA.woff') format('woff');
        }

        body {
            background-color: #ffffff; 
            font-family: 'Outfit', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden; /* மொபைலில் ஸ்க்ரோல் ஆகாமல் தடுக்க */
        }

        /* --- BACKGROUND DECORATION --- */
        .bg-pattern {
            position: absolute;
            font-family: 'Chivo Mono', monospace;
            font-size: 15vw;
            color: rgba(0, 0, 0, 0.02);
            white-space: nowrap;
            z-index: 1;
            user-select: none;
            font-weight: 900;
        }

        /* --- THE ELITE CARD --- */
        .elite-card {
            width: 350px;
            background: linear-gradient(145deg, #1a1a1a, #111111);
            border-radius: 24px;
            overflow: hidden;
            position: relative;
            z-index: 10;
            box-shadow: 0 50px 100px rgba(0,0,0,0.8);
            border: 1px solid rgba(255,255,255,0.05);
        }

        /* Top Design Accent */
        .header-design {
            position: absolute;
            top: 0;
            right: 0;
            width: 150px;
            height: 150px;
            background: rgba(125, 120, 120, 0.03);
            clip-path: polygon(100% 0, 0 0, 100% 100%);
        }

        /* Branding Section */
        .header {
            font-family: 'Automata', sans-serif !important;
            padding: 30px 25px 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .logo-img {
            width: 100%;
            max-width: 250px;
            height: auto;
        }

        /* Profile Area at the Bottom */
        .profile-area {
            margin-bottom: 25px; /* கீழே உள்ள பாருக்கும் இதற்கும் இடைவெளி */
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            position: relative;
        }

        /* Rectangle Photo Container */
        .photo-container-rect {
            width: 180px;        /* செவ்வக வித் */
            height: 120px;       /* செவ்வக ஹைட் */
            background: #000;
            padding: 6px;
            position: relative;
            border: 1px solid #333;
        }

        /* Corner Brackets for Photo */
        .photo-container-rect::before, .photo-container-rect::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            border-color: #fff;
            border-style: solid;
        }

        .photo-container-rect::before { top: -5px; left: -5px; border-width: 2px 0 0 2px; }
        .photo-container-rect::after { bottom: -5px; right: -5px; border-width: 0 2px 2px 0; }

        .photo-container-rect img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* User Info Section */
        .info-panel {
            padding: 25px 25px 20px;
            text-align: left;
        }

        .user-name {
            font-size: 28px;
            font-weight: 900;
            color: #fff;
            letter-spacing: -1px;
            line-height: 1.1;
        }

        .user-role {
            font-family: 'Chivo Mono', monospace;
            font-size: 10px;
            color: #777;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin: 8px 0 25px;
            display: block;
        }

        /* Tech Details Grid */
        .tech-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .tech-item {
            border-bottom: 1px solid #222;
            padding-bottom: 8px;
        }

        .tech-item.full-width {
            grid-column: span 2;
        }

        .tech-item label {
            font-size: 8px;
            color: #555;
            text-transform: uppercase;
            font-weight: 800;
            display: block;
            margin-bottom: 4px;
        }

        .tech-item span {
            font-size: 12px;
            color: #aaaaaa;
            font-weight: 600;
        }

        /* Signature and Seal Side-by-Side Container */
        .asset-grid {
            grid-column: span 2;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            border-bottom: 1px solid #222;
            padding-bottom: 8px;
        }

        .asset-item {
            display: flex;
            flex-direction: column;
        }

        .asset-item label {
            font-size: 8px;
            color: #555;
            text-transform: uppercase;
            font-weight: 800;
            margin-bottom: 4px;
        }

        /* Signature & Seal Styling */
        .asset-img {
            width: auto;
            max-width: 100px; /* இமேஜ் ரொம்ப பெருசாவதைத் தடுக்க */
            height: 160px;     /* சிக்னேச்சர் மற்றும் லோகோவின் உயரம் */
            margin-top: 5px;
            display: block;
            object-fit: contain;
        }

        .photo-container-rect img {
    width: 100%;
    height: 100%;
    object-fit: contain; /* இமேஜ் கிராப் ஆகாமல் முழு ஃபிரேமிலும் அடங்கும் */
    background-color: #000000; /* இமேஜ் சிறியதாக இருந்தால் பக்கவாட்டில் கேப் தெரியாமல் இருக்க பிளாக் கலர் */
    display: block;
}

        /* Status Indicator Valid Style */
        .status-indicator span {
            font-size: 13px;
            color: #27f103;
            font-weight: 700;
            margin-left: 10px;
            position: relative;
            top: -1px;
        }

        /* Footer - Stealth Bar */
        .footer-bar {
            background: #fff;
            color: #000;
            padding: 14px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .footer-bar span {
            font-size: 9px;
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .status-indicator-dot {
            width: 10px;
            height: 10px;
            background: #000;
            border-radius: 50%;
        }
    </style>
</head>
<body>

    <div class="bg-pattern">FKODE.SOLUTION</div>

    <div class="elite-card">
        <div class="header-design"></div>

        <!-- Branding Section -->
        <div class="header">
            <img src="images/FKlogo.png" alt="FKode Logo" class="logo-img">
        </div>

        <!-- User Information Panel -->
        <div class="info-panel">
            <h1 class="user-name">Shalem Nissi B</h1>
            <span class="user-role">Data Analyst Intern</span>

            <div class="tech-grid">
                <div class="tech-item">
                    <label>Certificate ID</label>
                    <span>FK-INT-2026-00016</span>
                </div>
                <div class="tech-item">
                    <label>Duration</label>
                    <span>25 Mar 2026 – 15 Jul 2026</span>
                </div>
                
                <div class="tech-item">
                    <label>Organization</label>
                    <span>FKode Solution</span>
                </div>
                <div class="tech-item">
                    <label>Issue Date</label>
                    <span>15/07/2026</span>
                </div>

                <div class="tech-item full-width">
                    <label>Certificate Status</label>
                    <div class="status-indicator" style="display: flex; align-items: center; height: 10px; background: #000; border-radius: 50%; width: 10px;">
                        <span style="font-size: 13px; color: #27f103; font-weight: 700; margin-left: 20px; white-space: nowrap;">Valid</span>
                    </div>
                </div>

                <!-- Signature & Seal in a single side-by-side layout -->
                <div class="asset-grid">
                    <div class="asset-item">
                        <label>CEO signature</label>
                        <img src="images/signn.png" alt="CEO Signature" class="asset-img">
                    </div>
                    <div class="asset-item">
                        <label>company seal</label>
                        <img src="images/logo.png" alt="Company Seal" class="asset-img">
                    </div>
                </div>
            </div>
        </div>

        <!-- Profile Photo Area (Centered Rectangle & Kept at the bottom) -->
        <div class="profile-area">
            <div class="photo-container-rect">
                <img src="certificate.jpg" alt="Profile Photo">
            </div>
        </div>

        <!-- Footer Stealth Bar -->
        <div class="footer-bar">
            <span>Official Digital Access</span>
            <div class="status-indicator-dot"></div>
        </div>
    </div>

</body>
</html>
